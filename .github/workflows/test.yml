name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke test reusable workflow under act
    runs-on: ubuntu-24.04
    services:
      moto:
        image: motoserver/moto:5.2.1@sha256:fe6575dcd878842124f05d20e4ffde2d1126e1e38ad03e196353b9e53649bcdf
        ports:
          - 5000:5000
      wiremock:
        image: wiremock/wiremock:3.13.2@sha256:fd27e46090916e85326229e5102ee169ae729059f3374549615bd20a35fee1f2
        ports:
          - 8080:8080
    env:
      ACT_VERSION: v0.2.89
      ACT_SHA256: 0191d6f1f3b716b5c55820032605d05fc3c1cdbf581ebeff655019e5dd1524c0
      ACT_PLATFORM_IMAGE: catthehacker/ubuntu:act-latest-20260529@sha256:115f4114babe23eb404bb7a253aac941dda6b86150b1e96592f50fb4ca58c563
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Wait for mock services
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:5000/moto-api/; do sleep 1; done'
          timeout 60 bash -c 'until curl -sf http://localhost:8080/__admin/health; do sleep 1; done'

      - name: Pre-create Terraform state bucket in moto
        env:
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:5000
        run: aws s3 mb s3://test-tfstate

      - name: Seed WireMock with GitHub API stubs
        run: |
          curl --fail-with-body -sS -X POST -H "Content-Type: application/json" \
            --data @testdata/fixtures/comments-empty.json \
            http://localhost:8080/__admin/mappings/import

      - name: Install act
        env:
          ACT_TARBALL: act_Linux_x86_64.tar.gz
        run: |
          tarball="/tmp/$ACT_TARBALL"
          curl -fsSL "https://github.com/nektos/act/releases/download/${ACT_VERSION}/${ACT_TARBALL}" -o "$tarball"
          echo "${ACT_SHA256}  ${tarball}" | sha256sum -c -
          sudo tar -xzf "$tarball" -C /usr/local/bin act
          act --version

      - name: Run reusable workflow under act
        env:
          MOCK_HOST: host.docker.internal
          # Real token so act can clone referenced actions (including the
          # internal composite-actions repo). Runtime GitHub API calls
          # from inside the workflow are routed to WireMock via
          # GITHUB_API_URL and GH_HOST. The fake event payload points at
          # a nonexistent repo, so even a leak would fail closed.
          ACT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          act pull_request \
            -W testdata/test-caller.yml \
            -e testdata/events/pull_request.json \
            --platform ubuntu-latest="${ACT_PLATFORM_IMAGE}" \
            --platform ubuntu-24.04="${ACT_PLATFORM_IMAGE}" \
            --container-options "--add-host=host.docker.internal:host-gateway" \
            --artifact-server-path /tmp/act-artifacts \
            --env "GITHUB_API_URL=http://${MOCK_HOST}:8080" \
            --env "GH_HOST=${MOCK_HOST}:8080" \
            --env "AWS_ENDPOINT_URL=http://${MOCK_HOST}:5000" \
            --env "AWS_ACCESS_KEY_ID=testing" \
            --env "AWS_SECRET_ACCESS_KEY=testing" \
            --env "AWS_DEFAULT_REGION=us-east-1" \
            --secret "GITHUB_TOKEN=${ACT_GITHUB_TOKEN}" \
            2>&1 | tee /tmp/act.log

      - name: Print WireMock request log
        if: always()
        run: |
          echo "=== WireMock request log ==="
          curl -sf http://localhost:8080/__admin/requests | jq '.requests[] | {method: .request.method, url: .request.url}'
          echo "=== /__admin/requests/count ==="
          curl -sf http://localhost:8080/__admin/requests/count | jq

      - name: Print moto state
        if: always()
        run: |
          echo "=== moto data ==="
          curl -sf "http://localhost:5000/moto-api/data.json" | jq '. | keys' || true
